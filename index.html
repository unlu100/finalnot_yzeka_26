<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Final Not Sorgulama</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      padding:40px;
    }

    .container{
      max-width:500px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      margin-bottom:15px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      background:#0077cc;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    button:hover{
      background:#005fa3;
    }

    .result{
      margin-top:20px;
      padding:15px;
      background:#eef;
      border-radius:5px;
    }

    .error{
      color:red;
      margin-top:15px;
    }
  </style>
</head>
<body>

<div class="container">

  <h2>Öğrenci Final Not Sorgulama</h2>
  <p style="font-size:0.85em; color:#666; margin-top:8px;">Not: Optik forma girdiğiniz şekilde; numaranızı doğru şekilde ve SOYADI + ADI biçiminde isim bilgisi girmeniz gerekmektedir.</p>

  <input type="text" id="ogrNo" placeholder="Öğrenci No">
  
  <input type="text" id="adSoyad" placeholder="AD SOYAD veya SOYAD AD">

  <button onclick="sorgula()">
    Sorgula
  </button>

  <div id="sonuc"></div>

</div>

//-- ADD THIS just before the existing inline 
<script> 
//-- config.js'i buraya ekleyin -->
<script src="./config.js"></script>
  
<script>

  //  --- CONFIG: replace these with your Supabase project values ---
  // -- Get them from Supabase project Settings -- API 
  // -- const supabaseUrl = "https://dumzxgwuzzuasdlqrytw.supabase.co"; 
  // örnek: https://<PROJECT>.supabase.co 
  // -- const supabaseKey = 'eyJhb***' 
  // REPLACE with your project's anon/public key (do NOT use service_role key) 
  // IF ANON_KEY DOES SHOWN CLEARLY 

  //- --- CONFIG: replace these with your Supabase project values --- 
  const supabaseUrl = window.SUPABASE_URL || 'https://dumzxgwuzzuasdlqrytw.supabase.co';
  const supabaseKey = window.SUPABASE_KEY || '<ANON_PUBLIC_KEY>';
  
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  const cevapAnahtari = {
    A: `A kitapçığı açıklaması:
S 1, 2, 3: Grafikli Soru
Soru 4, 5, 6: f(x)=...e^x // 1. ve 2. türev
S 7: Ln ... ^3 fonksiyon türevi
S 8: Polinom fonksiyon grafik teğeti
S 9, 10: 3x3 Matris determinantı ve kofaktör
Soru 11: e^f(x) fonksiyon integrali
Soru 12, 13, 14, 15: AC, MC, Kar fonksiyonu
S 16, 17: Doğrusal Denklem sistemi, ters matris çözümü
S 18: Birim matris bilgi sorusu
S 19, 20: AC ve MC dönüşüm türev
S 21: Belirli integral çözümü
S 22, 23: Kesirli İntegral çözümü
`,
    B: `B kitapçığı açıklaması:
S 1: Belirli integral çözümü
S 2, 3: Kesirli İntegral çözümü
Soru 4, 5, 6: f(x)=...e^x // 1. ve 2. türev
S 7, 8: Doğrusal Denklem sistemi, ters matris çözümü
S 9, 10: 3x3 Matris determinantı ve kofaktör
Soru 11: e^f(x) fonksiyon integrali
Soru 12, 13, 14, 15: AC, MC, Kar fonksiyonu
S 16: Ln ... ^3 fonksiyon türevi
S 17: Polinom fonksiyon grafik teğeti
S 18: Birim matris bilgi sorusu
S 19, 20: AC ve MC dönüşüm türev
S 21, 22, 23: Grafikli Soru
`
  };

  async function sorgula(){

    const ogrNo = document
      .getElementById("ogrNo")
      .value
      .trim();

    const adSoyad = document
      .getElementById("adSoyad")
      .value
      .trim();

    const sonucDiv = document.getElementById("sonuc");

    if(!ogrNo){
      sonucDiv.innerHTML = `<div class="error">Lütfen öğrenci numarası girin.</div>`;
      return;
    }

    // Safety check: warn if anon key not set in the file
    if(supabaseKey === '<ANON_PUBLIC_KEY>' || !supabaseKey || supabaseKey.trim() === ''){
      const msg = 'Supabase anon anahtarı index.html içinde ayarlı değil. Lütfen Supabase Dashboard → Settings → API → Project API keys → anon public key\nanahtarını supabaseKey de[...]'
      console.error(msg);
      sonucDiv.innerHTML = `<div class="error">${msg.replace(/\n/g,'<br>')}</div>`;
      return;
    }

    sonucDiv.innerHTML = "Sorgulanıyor...";

    try{
      // Build query and only add ilike filter if adSoyad provided
      let query = supabaseClient
        .from('final_haziran26_mat2')
        .select('*')
        .eq('no_duzgun', ogrNo)
        .limit(1);

      if(adSoyad){
        // ilike expects a pattern
        query = query.ilike('ad_soyad', `%${adSoyad}%`);
      }

      const { data, error } = await query;

      if(error){
        console.error('Supabase error:', error);
        sonucDiv.innerHTML = `<div class="error">Hata oluştu: ${error.message || JSON.stringify(error)}</div>`;
        return;
      }

      if(!data || data.length === 0){
        sonucDiv.innerHTML = `<div class="error">Kayıt bulunamadı.</div>`;
        return;
      }

      const ogr = data[0];

      // SAYACI ARTIR (optional - make sure your table/column names match and you have permission)
      try{
        const yeniSayac = (ogr.sayac || 0) + 1;
        await supabaseClient
          .from('final_haziran26_mat2')
          .update({ sayac: yeniSayac })
          .eq('ogr_no1', ogr.no_duzgun);

        // show yeniSayac even if update fails silently
        ogr._yeniSayac = yeniSayac;
      }catch(e){
        console.warn('Sayac güncellemesi başarısız:', e);
      }

      const kitapcikText = cevapAnahtari[ogr.kitapcik] || 'Cevap anahtarı bulunamadı.';

      sonucDiv.innerHTML = `
        <div class="result">

          <h3>Sonuç</h3>

          <p><strong>Öğrenci No:</strong> ${ogr.no_duzgun}</p>

          <p><strong>Ad Soyad:</strong> ${ogr.ad_soyad}</p>

          <p><strong>Ad Soyad Notu:</strong> ${ogr.hata_bildirim || ''}</p>

          <p><strong>Puan:</strong> ${ogr.hesap2son_x5_ek4 || ''}</p>

          <p><strong>Doğru Sayısı:</strong> ${ogr.dogru_sayi || ''}</p>

          <p><strong>Yanlış Sayısı:</strong> ${ogr.yanlis_sayi || ''}</p>

          <p><strong>Verdiğiniz Cevaplar:</strong> ${ogr.Konu1Cevap || ''}</p>

          <p><strong>Doğrular1:</strong> ${ogr.dogru_noformul || ''}</p>

          <p><strong>Yanlışlar:</strong> ${ogr.yanlis_noformul || ''}</p>

          <p><strong>Toplam Görüntülenme:</strong> ${ogr._yeniSayac || ogr.sayac || ''}</p>

          <p><strong>Kitapçık:</strong> ${ogr.kitapcik || ''}</p>

          <p><strong>Cevap Anahtarı:</strong></p>

            <div style="
              background:#f7f7f7;
              padding:10px;
              border-radius:5px;
              white-space:pre-wrap;
              font-family:monospace;
            ">
            ${kitapcikText}

              </div>
        </div>
      `;

    }catch(err){
      console.error('Beklenmeyen hata:', err);
      document.getElementById('sonuc').innerHTML = `<div class="error">Beklenmeyen hata oluştu. Konsolu kontrol edin.</div>`;
    }
  }

</script>

</body>
</html>
