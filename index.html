<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Final Not Sorgulama</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      padding:40px;
    }

    .container{
      max-width:500px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      margin-bottom:15px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      background:#0077cc;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    button:hover{
      background:#005fa3;
    }

    .result{
      margin-top:20px;
      padding:15px;
      background:#eef;
      border-radius:5px;
    }

    .error{
      color:red;
      margin-top:15px;
    }
  </style>
</head>
<body>

<div class="container">

  <h2>Öğrenci Final Not Sorgulama</h2>
  <p style="font-size:0.85em; color:#666; margin-top:8px;">Not: Optik forma girdiğiniz şekilde; numaranızı doğru şekilde ve SOYADI + ADI biçiminde isim bilgisi girmeniz gerekmektedir.</p>

  <input type="text" id="ogrNo" placeholder="Öğrenci No">
  
  <input type="text" id="adSoyad" placeholder="AD SOYAD veya SOYAD AD">

  <button onclick="sorgula()">
    Sorgula
  </button>

  <div id="sonuc"></div>

</div>

<!-- Config dosyasını yükle -->
<script src="./config.js"></script>

<script>

  const cevapAnahtari = {
    A: `A kitapçığı açıklaması:
S 1: YZ tanımı — bilişsel fonksiyonlar (öğrenme, problem çözme, karar verme, iletişim)
S 2: YZ terimi — John McCarthy, 1956 Dartmouth Konferansı
S 3: İş piyasası etkisi — bazı işler kaybolur, yenileri oluşur
S 4: Makine öğrenmesi — veriden öğrenme ve tahmin
S 5: Veri kalitesi — model doğruluğu veri miktarıyla ilişkili
S 6: Alt dal — denetimsiz öğrenme
S 7: YSA — insan beyninin bilgi işleme biçimini simüle eder
S 8: Aktivasyon fonksiyonu — çıktıyı belirli aralığa eşler (0–1)
S 9: Gizli katman — karmaşık örüntüleri yakalar
S 10: Derin öğrenme — yapay sinir ağlarıyla ilişkilidir
S 11: Halüsinasyon — mantıklı ama yanlış bilgi üretimi
S 12: DDM/NLP — dilbilim, bilgisayar bilimi, yapay zekâ kesişimi
S 13: DDİ amacı — insan dilini anlamak ve işlemek
S 14: Tokenleştirme — metni kelimelere/alt birimlere bölmek
S 15: Model — BERT (Google, 2018)
S 16: Üretken YZ işlevi — yeni içerik üretimi (metin, görsel, ses)
S 17: Uygulama örneği — DALL·E, görselden yeni görsel üretimi
S 18: Eğitim verisi — metin, görsel, ses gibi çoklu veri türleri
S 19: Üretken YZ dışı — sensör verileri (gerçek zamanlı)
S 20: Model — GPT (doğal dil üretimi)
S 21–27: Bilgi toplumu ve makine öğrenmesi genel kavramları
`,
    B: `B kitapçığı açıklaması:
S 1: DDİ zorluğu — anlamsal belirsizlik
S 2: Daniel Bell — bilgi üretim araçlarının yerine geçti
S 3: Yasuda — bilginin işlenmesi, dönüştürülmesi, yayılması
S 4: Crawford — otomasyon ve dijitalleşme
S 5: Bilgi — yeni üretim faktörü (hammadde/sermaye yerine)
S 6: Makine öğrenmesi dışı — antivirüs yazılım güncellemesi
S 7: Aktivasyon fonksiyonu — çıktıyı belirli aralığa eşlemek
S 8: Gizli katman — karmaşık örüntüleri yakalar
S 9: Derin öğrenme — yapay sinir ağlarıyla ilişkilidir
S 10: Halüsinasyon — mantıklı ama yanlış bilgi üretimi
S 11: NLP — dilbilim, bilgisayar bilimi, yapay zekâ kesişimi
S 12: Üretken YZ örneği — DALL·E görsel üretimi
S 13: Daniel Bell — kurumlar bilgi üretimi ve yönetimi odaklı
S 14: DDİ amacı — insan dilini anlamak ve işlemek
S 15: Tokenleştirme — metni kelime/alt birimlere bölmek
S 16: Model — BERT (Google, 2018)
S 17: Üretken YZ işlevi — yeni içerik üretimi
S 18: Eğitim verisi — metin, görsel, ses (çoklu veri)
S 19: Üretken YZ dışı — sensör verileri
S 20: Model — GPT (doğal dil üretimi)
S 21: YZ tanımı — bilişsel fonksiyonlar (öğrenme, problem çözme, karar verme, iletişim)
S 22: YZ terimi — John McCarthy, 1956 Dartmouth Konferansı
S 23: İş piyasası etkisi — bazı işler kaybolur, yenileri oluşur
S 24: Makine öğrenmesi — veriden öğrenme ve tahmin
S 25: Veri kalitesi — model doğruluğu veri miktarıyla ilişkili
S 26: Alt dal — denetimsiz öğrenme
S 27: YSA — insan beyninin bilgi işleme biçimini simüle eder
`
  };

  async function sorgula(){

    const ogrNo = document
      .getElementById("ogrNo")
      .value
      .trim();

    const adSoyad = document
      .getElementById("adSoyad")
      .value
      .trim();

    const sonucDiv = document.getElementById("sonuc");

    if(!ogrNo  || !adSoyad){
      sonucDiv.innerHTML = `<div class="error">Lütfen öğrenci numarası ve AD+SOYAD birlikte giriniz.</div>`;
      return;
    }

    // Safety check: config.js yüklü mü?
    if(!window.SUPABASE_URL || !window.SUPABASE_KEY){
      const msg = 'Supabase yapılandırması yüklenmedi. Lütfen config.js dosyasını kontrol edin.';
      console.error(msg);
      sonucDiv.innerHTML = `<div class="error">${msg}</div>`;
      return;
    }

    if(window.SUPABASE_KEY === '<ANON_PUBLIC_KEY>' || !window.SUPABASE_KEY.trim()){
      const msg = 'Supabase anon anahtarı config.js içinde ayarlı değil. Lütfen Supabase Dashboard → Settings → API → Project API keys → anon public key anahtarını config.js de ayarlayın.';
      console.error(msg);
      sonucDiv.innerHTML = `<div class="error">${msg.replace(/\n/g,'<br>')}</div>`;
      return;
    }

    sonucDiv.innerHTML = "Sorgulanıyor...";

    try{
      const supabaseUrl = window.SUPABASE_URL;
      const supabaseKey = window.SUPABASE_KEY;
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

      // Build query and only add ilike filter if adSoyad provided
      let query = supabaseClient
        .from('final_haziran26_yzeka')
        .select('*')
        .eq('no_duzgun', ogrNo)
        .limit(1);

      if(adSoyad){
        // ilike expects a pattern
        query = query.ilike('ad_soyad', `%${adSoyad}%`);
      }

      const { data, error } = await query;

      if(error){
        console.error('Supabase error:', error);
        sonucDiv.innerHTML = `<div class="error">Hata oluştu: ${error.message || JSON.stringify(error)}</div>`;
        return;
      }

      if(!data || data.length === 0){
        sonucDiv.innerHTML = `<div class="error">Kayıt bulunamadı.</div>`;
        return;
      }

      const ogr = data[0];

      // SAYACI ARTIR (optional - make sure your table/column names match and you have permission)
      try{
        const yeniSayac = (ogr.sayac || 0) + 1;
        await supabaseClient
          .from('final_haziran26_yzeka')
          .update({ sayac: yeniSayac })
          .eq('ogr_no1', ogr.no_duzgun);

        // show yeniSayac even if update fails silently
        ogr._yeniSayac = yeniSayac;
      }catch(e){
        console.warn('Sayac güncellemesi başarısız:', e);
      }

      const kitapcikText = cevapAnahtari[ogr.kitapcik] || 'Cevap anahtarı bulunamadı.';

      sonucDiv.innerHTML = `
        <div class="result">

          <h3>Sonuç</h3>

          <p><strong>Öğrenci No:</strong> ${ogr.no_duzgun}</p>

          <p><strong>Ad Soyad:</strong> ${ogr.ad_soyad}</p>

          <p><strong>Ad Soyad Notu:</strong> ${ogr.hata_bildirim || ''}</p>

          <p><strong>Puan:</strong> ${ogr.hesap2_x3 || ''}</p>

          <p><strong>Doğru Sayısı:</strong> ${ogr.dogru_sayi || ''}</p>

          <p><strong>Verdiğiniz Cevaplar:</strong> ${ogr.Konu1Cevap || ''}</p>

          <p><strong>Doğrular1:</strong> ${ogr.dogrular_liste2 || ''}</p>

          <p><strong>Yanlışlar:</strong> ${ogr.yanlislar_liste2 || ''}</p>

          <p><strong>Toplam Görüntülenme:</strong> ${ogr._yeniSayac || ogr.sayac || ''}</p>

          <p><strong>Kitapçık:</strong> ${ogr.kitapcik || ''}</p>

          <p><strong>Cevap Anahtarı:</strong></p>

            <div style="
              background:#f7f7f7;
              padding:10px;
              border-radius:5px;
              white-space:pre-wrap;
              font-family:monospace;
            ">
            ${kitapcikText}

              </div>
        </div>
      `;

    }catch(err){
      console.error('Beklenmeyen hata:', err);
      document.getElementById('sonuc').innerHTML = `<div class="error">Beklenmeyen hata oluştu. Konsolu kontrol edin.</div>`;
    }
  }

</script>

</body>
</html>
